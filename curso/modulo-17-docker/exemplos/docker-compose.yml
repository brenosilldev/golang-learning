version: "3.8"

services:
  # ============================================
  # API Go
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "1.0.0"
    container_name: go-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - DATABASE_URL=postgres://app:secret@db:5432/mydb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ============================================
  # PostgreSQL
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: go-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ============================================
  # Redis (cache/sessões)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: go-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - backend

volumes:
  pgdata:
  redisdata:

networks:
  backend:
    driver: bridge
