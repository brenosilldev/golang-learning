version: '3.9'

# Stack de desenvolvimento para golang-learning
# Cobre os módulos 16 (banco), 20 (Kafka/NATS), 21 (Observabilidade), 22 (K8s dev)
#
# Uso:
#   docker compose up -d          → sobe tudo
#   docker compose up -d kafka    → só Kafka
#   docker compose up -d obs      → Prometheus + Grafana + Jaeger
#   docker compose down           → para tudo
#   docker compose logs -f kafka  → logs do Kafka

services:

  # ─────────────────────────────────────────────
  # MÓDULO 16 — Banco de Dados
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: golang-postgres
    environment:
      POSTGRES_USER: golang
      POSTGRES_PASSWORD: golang123
      POSTGRES_DB: golang_learning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golang"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin — Interface web para o Postgres
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: golang-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@golang.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

  # ─────────────────────────────────────────────
  # MÓDULO 20 — Message Queues
  # ─────────────────────────────────────────────

  # NATS com JetStream (leve, ótimo para começar)
  nats:
    image: nats:2.10-alpine
    container_name: golang-nats
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Kafka (mais pesado, mais fiel ao mundo real)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: golang-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    profiles: ["kafka"]

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: golang-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["kafka"]

  # ─────────────────────────────────────────────
  # MÓDULO 21 — Observabilidade
  # ─────────────────────────────────────────────

  # Prometheus — coleta métricas
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: golang-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"

  # Grafana — dashboards
  grafana:
    image: grafana/grafana:10.3.0
    container_name: golang-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Jaeger — distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: golang-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  # Loki — agregação de logs
  loki:
    image: grafana/loki:2.9.0
    container_name: golang-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    profiles: ["obs-full"]

  # ─────────────────────────────────────────────
  # MÓDULO 19 — Consenso & Raft
  # ─────────────────────────────────────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: golang-etcd
    command:
      - etcd
      - --name=etcd0
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster-state=new
    ports:
      - "2379:2379"  # client
      - "2380:2380"  # peer
    volumes:
      - etcd_data:/etcd-data

volumes:
  postgres_data:
  nats_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  etcd_data:
